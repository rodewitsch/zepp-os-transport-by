<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="#2ecc40"/>

  <!-- Bus stop sign pole -->
  <rect x="122" y="60" width="12" height="150" rx="3" fill="#fff"/>

  <!-- Sign board -->
  <rect x="78" y="50" width="100" height="72" rx="14" fill="#fff"/>

  <!-- Inner sign area -->
  <rect x="88" y="60" width="80" height="52" rx="8" fill="#2ecc40"/>

  <!-- Simple bus shape inside sign -->
  <!-- Bus body -->
  <rect x="103" y="68" width="50" height="30" rx="6" fill="#fff"/>
  <!-- Windshield -->
  <rect x="138" y="72" width="11" height="12" rx="2" fill="#2ecc40"/>
  <!-- Side windows -->
  <rect x="107" y="72" width="8" height="10" rx="2" fill="#2ecc40"/>
  <rect x="118" y="72" width="8" height="10" rx="2" fill="#2ecc40"/>
  <!-- Wheels -->
  <circle cx="113" cy="100" r="5" fill="#fff"/>
  <circle cx="143" cy="100" r="5" fill="#fff"/>
  <circle cx="113" cy="100" r="2.5" fill="#2ecc40"/>
  <circle cx="143" cy="100" r="2.5" fill="#2ecc40"/>
  <!-- Headlight -->
  <rect x="150" y="88" width="4" height="4" rx="1" fill="#ffe066"/>

  <!-- Base/ground -->
  <rect x="100" y="200" width="56" height="12" rx="6" fill="#fff"/>
</svg>
